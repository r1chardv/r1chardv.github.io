<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadwell CC Aire Wharfe Junior Registrations</title>

<style>
:root {
    --club-maroon: #7a1f2b;
    --pale-maroon: #f5e6e8;
    --header-hover: #eed3d7;
    --bg: #f8fafc;
    --text: #1e293b;
}

body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 2rem;
}

.container {
    max-width: 900px;
    margin: 0 auto;
}

h1 {
    color: var(--club-maroon);
    margin-bottom: 1rem;
}

/* Search bar */
#searchBar {
    width: 100%;
    padding: 14px;
    margin-bottom: 20px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 1rem;
}

#searchBar:focus {
    outline: none;
    border-color: var(--club-maroon);
}

/* Table wrapper */
.table-wrapper {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
}

table {
    width: 100%;
    border-collapse: collapse;
}

/* Table headers */
th {
    background: var(--pale-maroon);
    color: var(--club-maroon);
    padding: 10px 14px;
    font-size: 0.8rem;
    text-transform: uppercase;
    cursor: pointer;
    border-bottom: 2px solid var(--header-hover);
    text-align: left;
}

th:hover {
    background: var(--header-hover);
}

td {
    padding: 8px 14px;
    border-bottom: 1px solid #f1f5f9;
    line-height: 1.25;
    vertical-align: middle;
}

tr:hover {
    background: #faf3f4;
}

/* ✅ Centre the REGISTERED column (header + values) */
th:nth-child(2),
td:nth-child(2) {
    text-align: center;
}

/* Player link */
td a.player-link {
    color: var(--club-maroon);
    font-weight: 600;
    text-decoration: underline;
}

/* Subs text */
.note {
    color: #475569;
}
</style>
</head>

<body>
<div class="container">
    <h1>🏏 Shadwell CC Aire Wharfe Junior Registrations</h1>

    <input
        id="searchBar"
        placeholder="Search player or age group..."
        onkeyup="renderTable()"
    >

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th onclick="sortTable('player')">Player ↕</th>
                    <th onclick="sortTable('registered')">Registered ↕</th>
                    <th onclick="sortTable('subs')">Subs Paid ↕</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
const players = [
    { player: "(U15) Muhammad Arham", registered: "YES (26)", subs: "NO", url: "https://awscl.play-cricket.com/player_stats/batting/5463545?rule_type_id=179" },
    { player: "(U9) Seb Meynell", registered: "YES (26)", subs: "NO", url: "https://awscl.play-cricket.com/player_stats/batting/5463545?rule_type_id=179" },
    { player: "(U9) Toby Jennison", registered: "YES (26)", subs: "YES (26)", url: "https://awscl.play-cricket.com/player_stats/batting/5463545?rule_type_id=179" },
    { player: "(U18) Oliver Bates", registered: "YES (26)", subs: "NO", url: "https://awscl.play-cricket.com/player_stats/batting/5463545?rule_type_id=179" },
    { player: "(U18) Max Campey", registered: "YES (26)", subs: "YES (26)", url: "https://awscl.play-cricket.com/player_stats/batting/5463545?rule_type_id=179" },
    { player: "(U18) Daniel Payne", registered: "YES (26)", subs: "NO", url: "https://awscl.play-cricket.com/player_stats/batting/6245954?rule_type_id=179" }
];

let sortAsc = true;

function renderTable() {
    const q = searchBar.value.toLowerCase();
    tableBody.innerHTML = "";

    players
        .filter(p =>
            p.player.toLowerCase().includes(q) ||
            p.registered.toLowerCase().includes(q) ||
            p.subs.toLowerCase().includes(q)
        )
        .forEach(p => {
            const tr = document.createElement("tr");

            const tdPlayer = document.createElement("td");
            const link = document.createElement("a");
            link.href = p.url;
            link.textContent = p.player;
            link.className = "player-link";
            tdPlayer.appendChild(link);

            const tdRegistered = document.createElement("td");
            tdRegistered.textContent = p.registered;

            const tdSubs = document.createElement("td");
            tdSubs.textContent = p.subs;
            tdSubs.className = "note";

            tr.append(tdPlayer, tdRegistered, tdSubs);
            tableBody.appendChild(tr);
        });
}

function sortTable(key) {
    sortAsc = !sortAsc;
    players.sort((a, b) => {
        const A = a[key].toLowerCase();
        const B = b[key].toLowerCase();
        if (A < B) return sortAsc ? -1 : 1;
        if (A > B) return sortAsc ? 1 : -1;
        return 0;
    });
    renderTable();
}

renderTable();
</script>
</body>
</html>
