<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shadwell CC Aire Wharfe Junior Registrations</title>

<style>
:root {
    --club-maroon: #7a1f2b;
    --pale-maroon: #f5e6e8;
    --header-hover: #eed3d7;
    --bg: #f8fafc;
    --text: #1e293b;

    --green: #166534;
    --green-bg: #dcfce7;

    --red: #991b1b;
    --red-bg: #fee2e2;

    --amber: #92400e;
    --amber-bg: #fef3c7;
}

body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 2rem;
}

.container {
    max-width: 900px;
    margin: 0 auto;
}

h1 {
    color: var(--club-maroon);
    margin-bottom: 1rem;
}

/* Search bar */
#searchBar {
    width: 100%;
    padding: 14px;
    margin-bottom: 20px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 1rem;
}

/* Table wrapper */
.table-wrapper {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
}

table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
}

/* Fixed column widths */
th:nth-child(1), td:nth-child(1) { width: 55%; }
th:nth-child(2), td:nth-child(2) { width: 22.5%; }
th:nth-child(3), td:nth-child(3) { width: 22.5%; }

/* Headers */
th {
    background: var(--pale-maroon);
    color: var(--club-maroon);
    padding: 10px 14px;
    font-size: 0.75rem;
    text-transform: uppercase;
    cursor: pointer;
    text-align: left;
}

th:hover {
    background: var(--header-hover);
}

/* Cells */
td {
    padding: 8px 14px;
    border-bottom: 1px solid #f1f5f9;
    vertical-align: middle;
}

tr:hover {
    background: #faf3f4;
}

/* Centre Registered + Subs */
th:nth-child(2),
td:nth-child(2),
th:nth-child(3),
td:nth-child(3) {
    text-align: center;
}

/* Player link */
.player-link {
    color: var(--club-maroon);
    font-weight: 600;
    text-decoration: underline;
}

/* Status pills */
.pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
    white-space: nowrap;
}

.pill.green {
    color: var(--green);
    background: var(--green-bg);
}

.pill.red {
    color: var(--red);
    background: var(--red-bg);
}

.pill.amber {
    color: var(--amber);
    background: var(--amber-bg);
}
</style>
</head>

<body>
<div class="container">
<h1>🏏 Shadwell CC Aire Wharfe Junior Registrations</h1>

<input id="searchBar" placeholder="Search player or age group..." onkeyup="renderTable()">

<div class="table-wrapper">
<table>
<thead>
<tr>
    <th onclick="sortTable('player')">Player ↕</th>
    <th onclick="sortTable('registered')">Registered ↕</th>
    <th onclick="sortTable('subs')">Subs Paid ↕</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>
</div>

<script>
const players = [
    { player: "(U9) Seb Meynell", registered: "YES (19/03/26)", subs: "NO", url: "#" },
    { player: "(U9) Toby Jennison", registered: "YES (17/03/26)", subs: "YES (26)", url: "#" },
    { player: "(U11) Toby Crowther", registered: "YES (06/04/26)", subs: "YES (26)", url: "#" },
    { player: "(U13) Krishay Yadav", registered: "NO", subs: "YES (26)", url: "#" }
];

let sortAsc = true;

function pill(text, type) {
    return `<span class="pill ${type}">${text}</span>`;
}

function statusPill(value, positive = "YES") {
    const hasYes = value.startsWith("YES");
    const hasNo = value.startsWith("NO");

    if (hasYes && positive === "YES") return pill(value, "green");
    if (hasNo) return pill(value, "red");
    if (!hasYes && positive === "NO") return pill(value, "amber");
    return pill(value, "amber");
}

function renderTable() {
    const q = searchBar.value.toLowerCase();
    tableBody.innerHTML = "";

    players
      .filter(p =>
        p.player.toLowerCase().includes(q) ||
        p.registered.toLowerCase().includes(q) ||
        p.subs.toLowerCase().includes(q)
      )
      .forEach(p => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td><a class="player-link" href="${p.url}    <td>${statusPill(p.registered)}</td>
            <td>${statusPill(p.subs)}</td>
        `;

        tableBody.appendChild(tr);
      });
}

function sortTable(key) {
    sortAsc = !sortAsc;
    players.sort((a, b) => {
        const A = a[key].toLowerCase();
        const B = b[key].toLowerCase();
        return sortAsc ? A.localeCompare(B) : B.localeCompare(A);
    });
    renderTable();
}

renderTable();
</script>
</body>
</html>
