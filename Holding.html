<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Player Not Found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #1f2933;
            --muted: #6b7280;
            --accent: #0f4c81;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            background: var(--card);
            padding: 3rem 2.5rem;
            max-width: 420px;
            width: 90%;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0.5rem 0;
        }

        p {
            margin: 0.75rem 0 1.75rem;
            color: var(--muted);
            line-height: 1.5;
        }

        .button {
            display: inline-block;
            text-decoration: none;
            background: var(--accent);
            color: #ffffff;
            padding: 0.6rem 1.25rem;
            border-radius: 999px;
            font-weight: 500;
            transition: background 0.2s ease;
        }

        .button:hover {
            background: #0c3d68;
        }

        footer {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="icon">🏏</div>
        <h1>Player Not Found</h1>
        <p>
            This player does not have a Play‑Cricket record.
        </p>
        <a class="button" href="Juniors.html">Return to home page</a>
        <footer>
            Error reference: SCC‑1895
        </footer>
    </main>
</body>
</html>
