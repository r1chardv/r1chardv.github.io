<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shadwell CC Aire Wharfe Junior Registrations</title>

<style>
:root { --maroon:#7a1f2b; }

body {
  font-family: system-ui, sans-serif;
  background:#f8fafc;
  padding:24px;
}

.container { max-width:900px; margin:auto; }

h1 { color:var(--maroon); }

input {
  width:100%;
  padding:12px;
  margin:10px 0;
}

.age-filters {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:16px;
}

.age-btn {
  border:2px solid var(--maroon);
  background:white;
  color:var(--maroon);
  padding:6px 14px;
  border-radius:999px;
  cursor:pointer;
  font-weight:600;
}

.age-btn.active {
  background:var(--maroon);
  color:white;
}

table {
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td {
  padding:10px;
  border-bottom:1px solid #ddd;
}

th { background:#f3e6e8; color:var(--maroon); }

td:nth-child(2), td:nth-child(3),
th:nth-child(2), th:nth-child(3) {
  text-align:center;
}

.player-link {
  color:var(--maroon);
  font-weight:600;
  text-decoration:underline;
}

.notifications {
  margin-top:32px;
  display:grid;
  gap:16px;
}

@media(min-width:700px){
  .notifications { grid-template-columns:1fr 1fr; }
}

.notification-card {
  background:white;
  padding:16px;
  border-left:6px solid var(--maroon);
}
</style>
</head>

<body>
<div class="container">

<h1>🏏 Shadwell CC Aire Wharfe Junior Registrations</h1>

<input id="search" placeholder="Search player or age group…">

<div class="age-filters">
  <button class="age-btn active" data-age="ALL">All</button>
  <button class="age-btn" data-age="U9">U9</button>
  <button class="age-btn" data-age="U11">U11</button>
  <button class="age-btn" data-age="U13">U13</button>
  <button class="age-btn" data-age="U15">U15</button>
  <button class="age-btn" data-age="U18">U18</button>
</div>

<table>
<thead>
<tr>
  <th>Player</th>
  <th>Registered</th>
  <th>Subs Paid</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<div class="notifications">
  <div class="notification-card">
    <h3>📝 Junior Registration</h3>
    <a href="https://sccrams.uk/l/jnrreg.htm" target="_blank">Register a junior player →</a>
  </div>
  <div class="notification-card">
    <h3>💷 Summer Subscriptions</h3>
    <a href="https://sccrams.uk/l/jnrsubs.png" target="_blank">View subs payment details →</a>
  </div>
</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const search = document.getElementById("search");
  const body = document.getElementById("body");
  const buttons = document.querySelectorAll(".age-btn");

  let age = "ALL";

  const players = [

  {p:"Seb Hayward (U9)", r:"YES (21/04/26)", s:"YES (22/04/26)"},
  {p:"Teddy Cosgrove (U9)", r:"YES (20/04/26)", s:"YES (20/04/26)"},
  {p:"Seb Meynell (U9)", r:"YES (19/03/26)", s:"NO"},
  {p:"Toby Jennison (U9)", r:"YES (17/03/26)", s:"YES (17/03/26)"},
  {p:"Ben Lewis (U9)", r:"YES (19/04/26)", s:"YES (19/04/26)"},
  {p:"Alex Grey (U9)", r:"YES (19/04/26)", s:"YES (19/04/26)"},
  {p:"Emerson Alker (U9)", r:"YES (19/04/26)", s:"YES (20/04/26)"},
  {p:"Josh Warren (U9)", r:"YES (20/04/26)", s:"YES (20/04/26)"},
  {p:"Zachary Rathyal (U9)", r:"YES (28/04/26)", s:"NO"},    

  {p:"Toby Crowther (U11)", r:"YES (06/04/26)", s:"YES (07/04/26)"},
  {p:"Alex Knowles (U11)", r:"YES (06/04/26)", s:"YES (03/04/26)"},
  {p:"Haris Nawaz (U11)", r:"YES (08/04/26)", s:"YES (09/04/26)"},
  {p:"Charlie Meynell (U11)", r:"YES (19/03/26)", s:"NO"},
  {p:"Atticus Khan (U11)", r:"YES (19/03/26)", s:"YES (19/03/26)"},
  {p:"Finn Jennison (U11)", r:"YES (17/03/26)", s:"YES (17/03/26)"},
  {p:"Toby Entwistle (U11)", r:"YES (17/03/26)", s:"YES (17/03/26)"},
  {p:"William Warren (U11)", r:"YES (20/04/26)", s:"YES (20/04/26)"},

  {p:"Henry Hayward (U13)", r:"YES (21/04/26)", s:"YES (22/04/26)"},
  {p:"Mollie Swaine (U13)", r:"YES (22/03/26)", s:"YES (22/03/26)"},
  {p:"Ruben Turner (U13/U15)", r:"YES (18/03/26)", s:"YES (19/03/26)"},
  {p:"Archie Jones (U13)", r:"YES (18/03/26)", s:"NO"},
  {p:"Rory Crowther (U13)", r:"YES (06/04/26)", s:"YES (07/04/26)"},
  {p:"Jacob Bartfield (U13)", r:"YES (06/03/26)", s:"NO"},

  {p:"Muhammad Arham (U15)", r:"YES (31/03/26)", s:"NO"},
  {p:"Hakeem Iqbal (U15)", r:"YES (27/04/26)", s:"NO"},

  {p:"Faris Shahpal (U15)", r:"YES (13/04/26)", s:"NO"},
  {p:"Geoff Savage (U15)", r:"YES (13/04/26)", s:"NO"},
  {p:"Tom Wilson (U15)", r:"YES (19/04/26)", s:"YES (19/04/26)"},
  {p:"Archi Chandra (U15)", r:"YES (17/04/26)", s:"YES (28/04/26)"},
  {p:"Zac Boddington (U15)", r:"YES (20/04/26)", s:"NO"},
  {p:"Hakeem Iqbal (U15)", r:"YES (27/04/26)", s:"NO"},

  {p:"Oliver Bates (U18)", r:"YES (22/03/26)", s:"NO"},
  {p:"Max Campey (U18)", r:"YES (07/04/26)", s:"YES (08/04/26)"},
  {p:"Sam Caulfield (U18)", r:"YES (17/04/26)", s:"NO"},
  {p:"Daniel Payne (U18)", r:"YES (14/02/26)", s:"YES (14/02/26)"}

  ];

  function render(){
    const q = search.value.toLowerCase();
    body.innerHTML = "";

    players.filter(x=>{
      return (age==="ALL" || x.p.includes(age)) &&
             x.p.toLowerCase().includes(q);
    }).forEach(x=>{
      body.insertAdjacentHTML("beforeend", `
        <tr>
          <td>${x.p}</td>
          <td>${x.r}</td>
          <td>${x.s}</td>
        </tr>
      `);
    });
  }

  buttons.forEach(b=>{
    b.onclick = ()=>{
      age = b.dataset.age;
      buttons.forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      render();
    };
  });

  search.oninput = render;
  render();
});
</script>

</body>
</html>
