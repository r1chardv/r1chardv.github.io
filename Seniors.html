<style>
:root {
    --club-maroon: #7a1f2b;
    --pale-maroon: #f5e6e8;
    --header-hover: #eed3d7;
    --bg: #f8fafc;
    --text: #1e293b;
}

body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 2rem;
}

.container {
    max-width: 900px;
    margin: 0 auto;
}

h1 {
    color: var(--club-maroon);
    margin-bottom: 1rem;
}

/* Search bar */
#searchBar {
    width: 100%;
    padding: 14px;
    margin-bottom: 20px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 1rem;
}

#searchBar:focus {
    outline: none;
    border-color: var(--club-maroon);
}

/* Table wrapper */
.table-wrapper {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
}

table {
    width: 100%;
    border-collapse: collapse;
}

/* ✅ Balanced, clean spacing */
th {
    background: var(--pale-maroon);
    color: var(--club-maroon);
    padding: 10px 14px;
    font-size: 0.8rem;
    text-transform: uppercase;
    cursor: pointer;
    border-bottom: 2px solid var(--header-hover);
}

th:hover {
    background: var(--header-hover);
}

td {
    padding: 8px 14px;
    border-bottom: 1px solid #f1f5f9;
    line-height: 1.25;
    vertical-align: middle;
}

tr:hover {
    background: #faf3f4;
}

/* Centre SCC Debut */
th:nth-child(2),
td:nth-child(2) {
    text-align: center;
}

/* Player link */
td a.player-link {
    color: var(--club-maroon);
    font-weight: 600;
    text-decoration: underline;
}

/* Notes text */
.note {
    color: #475569;
}
</style>
</head>

let sortAsc = true;

function renderTable() {
    const q = searchBar.value.toLowerCase();
    tableBody.innerHTML = "";

    players
        .filter(p =>
            p.player.toLowerCase().includes(q) ||
            p.notes.toLowerCase().includes(q) ||
            String(p.debut).includes(q)
        )
        .forEach(p => {
            const tr = document.createElement("tr");

            const tdPlayer = document.createElement("td");
            const link = document.createElement("a");
            link.href = p.url;
            link.textContent = p.player;
            link.className = "player-link";
            tdPlayer.appendChild(link);

            const tdDebut = document.createElement("td");
            tdDebut.textContent = p.debut;

            const tdNotes = document.createElement("td");
            tdNotes.textContent = p.notes;
            tdNotes.className = "note";

            tr.append(tdPlayer, tdDebut, tdNotes);
            tableBody.appendChild(tr);
        });
}

function sortTable(key) {
    sortAsc = !sortAsc;
    players.sort((a, b) => {
        const A = a[key].toString().toLowerCase();
        const B = b[key].toString().toLowerCase();
        if (A < B) return sortAsc ? -1 : 1;
        if (A > B) return sortAsc ? 1 : -1;
        return 0;
    });
    renderTable();
}
