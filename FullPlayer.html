<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadwell CC Aire Wharfe Registrations</title>

<style>
:root {
  --club-maroon: #7a1f2b;
  --pale-maroon: #f5e6e8;
  --header-hover: #eed3d7;
  --bg: #f8fafc;
  --text: #1e293b;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 2rem;
}

.container {
  max-width: 900px;
  margin: 0 auto;
}

h1 {
  color: var(--club-maroon);
  margin-bottom: 1rem;
}

#searchBar {
  width: 100%;
  padding: 14px;
  margin-bottom: 20px;
  border: 2px solid #e2e8f0;
  border-radius: 8px;
  font-size: 1rem;
}

#searchBar:focus {
  outline: none;
  border-color: var(--club-maroon);
}

.table-wrapper {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: var(--pale-maroon);
  color: var(--club-maroon);
  padding: 10px 14px;
  font-size: 0.8rem;
  text-transform: uppercase;
  cursor: pointer;
  border-bottom: 2px solid var(--header-hover);
}

th:hover {
  background: var(--header-hover);
}

td {
  padding: 8px 14px;
  border-bottom: 1px solid #f1f5f9;
  vertical-align: middle;
}

tr:hover {
  background: #faf3f4;
}

th:nth-child(2),
td:nth-child(2) {
  text-align: center;
}

.player-link {
  color: var(--club-maroon);
  font-weight: 600;
  text-decoration: underline;
}

.player-photo-link {
  margin-left: 6px;
  color: var(--club-maroon);
  text-decoration: underline;
  cursor: pointer;
}

.note {
  color: #475569;
}
</style>
</head>

<body>
<div class="container">

<h1>🏏 Shadwell CC Aire Wharfe Registrations</h1>

<input
  id="searchBar"
  placeholder="Search player, registration year, or club..."
  onkeyup="renderTable()"
/>

<div class="table-wrapper">
<table>
<thead>
<tr>
  <th onclick="sortTable('player')">Player ↕</th>
  <th onclick="sortTable('debut')">AWSCL Reg ↕</th>
  <th onclick="sortTable('notes')">Transfer From / Notes ↕</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

  { player:"Richard Vincent", debut:2022, notes:"", statsUrl:"https://awscl.play-cricket.com/player_stats/batting/2737664?rule_type_id=179", photoUrl:"images/richard-vincent.jpg" },
  { player:"Gary Wilson", debut:2022, notes:"", statsUrl:"https://awscl.play-cricket.com/player_stats/batting/4371103?rule_type_id=179", photoUrl:"images/gary-wilson.jpg" }
];

let sortAsc = true;

function renderTable() {
  const q = searchBar.value.toLowerCase();
  tableBody.innerHTML = "";

  players
    .filter(p =>
      p.player.toLowerCase().includes(q) ||
      p.notes.toLowerCase().includes(q) ||
      String(p.debut).includes(q)
    )
    .forEach(p => {
      const tr = document.createElement("tr");

      const tdPlayer = document.createElement("td");

      const nameLink = document.createElement("a");
      nameLink.href = p.statsUrl;
      nameLink.textContent = p.player;
      nameLink.className = "player-link";
      nameLink.target = "_blank";

      const photoLink = document.createElement("a");
      photoLink.href = p.photoUrl;
      photoLink.textContent = " ▣";
      photoLink.className = "player-photo-link";
      photoLink.title = "View player photo";
      photoLink.target = "_blank";

      tdPlayer.append(nameLink, photoLink);

      tr.append(
        tdPlayer,
        Object.assign(document.createElement("td"), { textContent: p.debut }),
        Object.assign(document.createElement("td"), { textContent: p.notes, className: "note" })
      );

      tableBody.appendChild(tr);
    });
}

function sortTable(key) {
  sortAsc = !sortAsc;
  players.sort((a, b) => {
    const A = a[key].toString().toLowerCase();
    const B = b[key].toString().toLowerCase();
    return A < B ? (sortAsc ? -1 : 1)
         : A > B ? (sortAsc ? 1 : -1)
         : 0;
  });
  renderTable();
}

renderTable();
</script>

</body>
</html>
