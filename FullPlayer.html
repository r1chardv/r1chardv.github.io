<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Photo</title>

<style>
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f8fafc;
    text-align: center;
    padding: 2rem;
  }

  h1 {
    color: #7a1f2b;
    margin-bottom: 1.5rem;
  }

  img.player-photo {
    width: 50%;
    max-width: 300px;   /* prevents being too large on desktop */
    height: auto;
    border-radius: 6px;
    box-shadow: 0 8px 15px rgba(0,0,0,0.15);
  }
</style>
</head>

<body>

<h1>Zakee Anwar</h1>

<img
  src="zakee-anwar.jpg"
  alt="Zakee Anwar"
  class="player-photo"
/>

</body>
</html>
