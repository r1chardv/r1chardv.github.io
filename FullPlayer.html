:root {
  --club-maroon: #7a1f2b;
  --pale-maroon: #f5e6e8;
  --header-hover: #eed3d7;
  --bg: #f8fafc;
  --text: #1e293b;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 2rem;
}

.container {
  max-width: 900px;
  margin: 0 auto;
}

h1 {
  color: var(--club-maroon);
  margin-bottom: 1rem;
}

/* Search */
#searchBar {
  width: 100%;
  padding: 14px;
  margin-bottom: 20px;
  border: 2px solid #e2e8f0;
  border-radius: 8px;
  font-size: 1rem;
}

/* Table */
.table-wrapper {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: var(--pale-maroon);
  color: var(--club-maroon);
  padding: 10px 14px;
  font-size: 0.8rem;
  text-transform: uppercase;
  cursor: pointer;
}

th:hover {
  background: var(--header-hover);
}

td {
  padding: 8px 14px;
  border-bottom: 1px solid #f1f5f9;
}

th:nth-child(2),
td:nth-child(2) {
  text-align: center;
}

tr:hover {
  background: #faf3f4;
}

/* Links */
.player-link {
  color: var(--club-maroon);
  font-weight: 600;
  text-decoration: underline;
}

.photo-link {
  margin-left: 6px;
  color: var(--club-maroon);
  text-decoration: underline;
}

.note {
  color: #475569;
}
</style>

let sortAsc = true;

function renderTable() {
  const q = searchBar.value.toLowerCase();
  tableBody.innerHTML = "";

  players.filter(p =>
    p.player.toLowerCase().includes(q) ||
    p.notes.toLowerCase().includes(q) ||
    String(p.debut).includes(q)
  ).forEach(p => {

    const tr = document.createElement("tr");

    const tdPlayer = document.createElement("td");

    const nameLink = document.createElement("a");
    nameLink.href = p.stats;
    nameLink.textContent = p.player;
    nameLink.className = "player-link";
    nameLink.target = "_blank";
    nameLink.rel = "noopener";

    const photoLink = document.createElement("a");
    photoLink.href = p.photo || PLACEHOLDER_IMAGE;
    photoLink.textContent = "▣";
    photoLink.className = "photo-link";
    photoLink.target = "_blank";
    photoLink.rel = "noopener";

    tdPlayer.append(nameLink, photoLink);

    const tdDebut = document.createElement("td");
    tdDebut.textContent = p.debut;

    const tdNotes = document.createElement("td");
    tdNotes.textContent = p.notes;
    tdNotes.className = "note";

    tr.append(tdPlayer, tdDebut, tdNotes);
    tableBody.appendChild(tr);
  });
}

function sortTable(key) {
  sortAsc = !sortAsc;
  players.sort((a, b) =>
    a[key] < b[key] ? (sortAsc ? -1 : 1)
    : a[key] > b[key] ? (sortAsc ? 1 : -1)
    : 0
  );
  renderTable();
}

renderTable();
