<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadwell CC Aire Wharfe Registrations</title>

<style>
:root {
  --club-maroon: #7a1f2b;
  --pale-maroon: #f5e6e8;
  --header-hover: #eed3d7;
  --bg: #f8fafc;
  --text: #1e293b;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 2rem;
}

.container {
  max-width: 900px;
  margin: 0 auto;
}

h1 {
  color: var(--club-maroon);
  margin-bottom: 1rem;
}

#searchBar {
  width: 100%;
  padding: 14px;
  margin-bottom: 20px;
  border: 2px solid #e2e8f0;
  border-radius: 8px;
  font-size: 1rem;
}

#searchBar:focus {
  outline: none;
  border-color: var(--club-maroon);
}

.table-wrapper {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: var(--pale-maroon);
  color: var(--club-maroon);
  padding: 10px 14px;
  font-size: 0.8rem;
  text-transform: uppercase;
  cursor: pointer;
  border-bottom: 2px solid var(--header-hover);
}

th:hover {
  background: var(--header-hover);
}

td {
  padding: 8px 14px;
  border-bottom: 1px solid #f1f5f9;
  vertical-align: middle;
}

tr:hover {
  background: #faf3f4;
}

th:nth-child(2),
td:nth-child(2) {
  text-align: center;
}

.player-link {
  color: var(--club-maroon);
  font-weight: 600;
  text-decoration: underline;
}

.player-photo-link {
  margin-left: 6px;
  color: var(--club-maroon);
  text-decoration: underline;
  cursor: pointer;
}

.player-photo-link:hover {
  text-decoration: none;
}

.note {
  color: #475569;
}
</style>
</head>

<body>
<div class="container">

<h1>🏏 Shadwell CC Aire Wharfe Registrations</h1>

<input
  id="searchBar"
  placeholder="Search player, registration year, or club..."
  onkeyup="renderTable()"
/>

<div class="table-wrapper">
<table>
<thead>
<tr>
  <th onclick="sortTable('player')">Player ↕</th>
  <th onclick="sortTable('debut')">AWSCL Reg ↕</th>
  <th onclick="sortTable('notes')">Transfer From / Notes ↕</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<script>
const players = [
  {
    player: "Zakee Anwar",
    debut: 2026,
    notes: "Burton Salmon CC",
    statsUrl: "https://awscl.play-cricket.com/player_stats/batting/5463545?rule_type_id=179",
    photoUrl: "images/zakee-anwar.jpg"
  },
  {
    player: "Abdul Hafeez",
    debut: 2026,
    notes: "(Overseas Born English Resident)",
    statsUrl: "https://awscl.play-cricket.com/player_stats/batting/6245954?rule_type_id=179",
    photoUrl: "images/abdul-hafeez.jpg"
  },
  {
    player: "Danyaal Khan",
    debut: 2026,
    notes: "Gomersal CC",
    statsUrl: "https://awscl.play-cricket.com/player_stats/batting/5422752?rule_type_id=179",
    photoUrl: "images/danyaal-khan.jpg"
  },
  {
    player: "Zarak Khan",
    debut: 2026,
    notes: "Drighlington CC",
    statsUrl: "https://awscl.play-cricket.com/player_stats/batting/6631709?rule_type_id=179",
    photoUrl: "images/zarak-khan.jpg"
  }
  /* ✅ Continue the rest of the players exactly the same way */
];

let sortAsc = true;

function renderTable() {
  const q = searchBar.value.toLowerCase();
  tableBody.innerHTML = "";

  players
    .filter(p =>
      p.player.toLowerCase().includes(q) ||
      p.notes.toLowerCase().includes(q) ||
      String(p.debut).includes(q)
    )
    .forEach(p => {
      const tr = document.createElement("tr");

      const tdPlayer = document.createElement("td");

      const nameLink = document.createElement("a");
      nameLink.href = p.statsUrl;
      nameLink.textContent = p.player;
      nameLink.className = "player-link";
      nameLink.target = "_blank";
      nameLink.rel = "noopener";

      const photoLink = document.createElement("a");
      photoLink.href = p.photoUrl;
      photoLink.textContent = " ▣";
      photoLink.className = "player-photo-link";
      photoLink.title = "View player photo";
      photoLink.target = "_blank";
      photoLink.rel = "noopener";

      tdPlayer.append(nameLink, photoLink);

      const tdDebut = document.createElement("td");
      tdDebut.textContent = p.debut;

      const tdNotes = document.createElement("td");
      tdNotes.textContent = p.notes;
      tdNotes.className = "note";

      tr.append(tdPlayer, tdDebut, tdNotes);
      tableBody.appendChild(tr);
    });
}

function sortTable(key) {
  sortAsc = !sortAsc;
  players.sort((a, b) => {
    const A = a[key].toString().toLowerCase();
    const B = b[key].toString().toLowerCase();
    if (A < B) return sortAsc ? -1 : 1;
    if (A > B) return sortAsc ? 1 : -1;
    return 0;
  });
  renderTable();
}

renderTable();
</script>

</body>
</html>
