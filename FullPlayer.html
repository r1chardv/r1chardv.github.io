<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadwell CC Aire Wharfe Registrations</title>

<style>
:root {
  --club-maroon: #7a1f2b;
  --pale-maroon: #f5e6e8;
  --header-hover: #eed3d7;
  --bg: #f8fafc;
  --text: #1e293b;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 2rem;
}

.container {
  max-width: 950px;
  margin: 0 auto;
}

h1 {
  color: var(--club-maroon);
  margin-bottom: 1rem;
}

#searchBar {
  width: 100%;
  padding: 14px;
  margin-bottom: 20px;
  border: 2px solid #e2e8f0;
  border-radius: 8px;
  font-size: 1rem;
}

.table-wrapper {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: var(--pale-maroon);
  color: var(--club-maroon);
  padding: 10px 14px;
  font-size: 0.8rem;
  text-transform: uppercase;
  cursor: pointer;
  border-bottom: 2px solid var(--header-hover);
}

th:hover { background: var(--header-hover); }

td {
  padding: 8px 14px;
  border-bottom: 1px solid #f1f5f9;
  vertical-align: middle;
}

tr:hover { background: #faf3f4; }

th:nth-child(2),
td:nth-child(2) { text-align: center; }

.player-link {
  font-weight: 600;
  color: var(--club-maroon);
  text-decoration: underline;
}

.photo-link {
  margin-left: 6px;
  color: var(--club-maroon);
  text-decoration: underline;
}

.note { color: #475569; }
</style>
</head>

<body>
<div class="container">

<h1>🏏 Shadwell CC Aire Wharfe Registrations</h1>

<input id="searchBar"
       placeholder="Search player, registration year, or club..."
       onkeyup="renderTable()">

<div class="table-wrapper">
<table>
<thead>
<tr>
  <th onclick="sortTable('player')">Player ↕</th>
  <th onclick="sortTable('debut')">AWSCL Reg ↕</th>
  <th onclick="sortTable('notes')">Transfer From / Notes ↕</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

let asc = true;

function renderTable() {
  const q = searchBar.value.toLowerCase();
  tableBody.innerHTML = "";
  players.filter(p =>
    p.player.toLowerCase().includes(q) ||
    p.notes.toLowerCase().includes(q) ||
    String(p.debut).includes(q)
  ).forEach(p => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>
        ${p.stats}${p.player}</a>
        <a class="photo-link" href="${p.photo}" targett}</td>
      <td class="note">${p.notes}</td>`;
    tableBody.appendChild(tr);
  });
}

function sortTable(key) {
  asc = !asc;
  players.sort((a,b) =>
    a[key] > b[key] ? (asc?1:-1) : (a[key] < b[key] ? (asc?-1:1) : 0));
  renderTable();
}

renderTable();
</script>
